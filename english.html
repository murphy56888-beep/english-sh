<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沪教版二年级下册英语</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Microsoft YaHei,sans-serif}
body{background:#f5f7fa;padding:20px}
.container{max-width:800px;margin:0 auto}

.header{text-align:center;color:#2d6bf2;margin-bottom:30px}

.unit-box{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:30px}
.unit-card{background:white;border:2px solid #2d6bf2;border-radius:10px;padding:16px}
.unit-title{text-align:center;font-size:18px;font-weight:bold;color:#2d6bf2;margin-bottom:10px}
.unit-btn-group{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.unit-btn{padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:14px}
.audio-btn{background:#e8f4ff;color:#2d6bf2;border:1px solid #2d6bf2}
.video-btn{background:#fff0f0;color:#e64340;border:1px solid #e64340}
.unit-btn.active{color:white}
.audio-btn.active{background:#2d6bf2}
.video-btn.active{background:#e64340}

.player{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 10px #00000010;margin-bottom:20px}
.player-tab{display:flex;gap:10px;margin-bottom:15px}
.player-tab-btn{padding:8px 16px;border:none;border-radius:6px;font-size:14px;cursor:pointer;background:#eee}
.player-tab-btn.active{background:#2d6bf2;color:white}

/* 这里改成 3:4 */
.video-container{width:100%;aspect-ratio:3/4;border-radius:8px;overflow:hidden;margin-bottom:15px;display:none}
.video-container.active{display:block}
#video-player{width:100%;height:100%;object-fit:contain;background:#000}

.audio-tip{height:120px;display:flex;align-items:center;justify-content:center;border:1px dashed #ddd;border-radius:8px;margin-bottom:15px;color:#999;display:none}
.audio-tip.active{display:flex}

.controls{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.control-btn{width:44px;height:44px;border-radius:50%;background:#2d6bf2;color:white;border:none;font-size:18px;cursor:pointer}
.progress{flex:1;height:8px;background:#eee;border-radius:4px;cursor:pointer;min-width:150px}
.progress-bar{height:100%;background:#2d6bf2;width:0%;border-radius:4px}
.speed{padding:6px 8px;border:1px solid #ddd;border-radius:6px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>沪教版二年级下册英语</h2>
    <p>点击音频/视频播放，支持慢放/暂停</p>
  </div>

  <div class="unit-box">
    <div class="unit-card">
      <div class="unit-title">Unit 1</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="unit1.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="unit1.mp4">拼读视频</div>
      </div>
    </div>
    <div class="unit-card">
      <div class="unit-title">Unit 2</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="unit2.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="unit2.mp4">拼读视频</div>
      </div>
    </div>
    <div class="unit-card">
      <div class="unit-title">Unit 3</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="unit3.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="unit3.mp4">拼读视频</div>
      </div>
    </div>
    <div class="unit-card">
      <div class="unit-title">Unit 4</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="unit4.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="unit4.mp4">拼读视频</div>
      </div>
    </div>
    <div class="unit-card">
      <div class="unit-title">Unit 5</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="unit5.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="unit5.mp4">拼读视频</div>
      </div>
    </div>
    <div class="unit-card">
      <div class="unit-title">Unit 6</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="unit6.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="unit6.mp4">拼读视频</div>
      </div>
    </div>
    <div class="unit-card">
      <div class="unit-title">Unit 7</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="unit7.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="unit7.mp4">拼读视频</div>
      </div>
    </div>
    <div class="unit-card">
      <div class="unit-title">Unit 8</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="unit8.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="unit8.mp4">拼读视频</div>
      </div>
    </div>
    <div class="unit-card">
      <div class="unit-title">Unit 9</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="unit9.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="unit9.mp4">拼读视频</div>
      </div>
    </div>
    <div class="unit-card">
      <div class="unit-title">Unit 10</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="unit10.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="unit10.mp4">拼读视频</div>
      </div>
    </div>
    <div class="unit-card">
      <div class="unit-title">Word Bank</div>
      <div class="unit-btn-group">
        <div class="unit-btn audio-btn" data-type="audio" data-src="wordbank.mp3">音频</div>
        <div class="unit-btn video-btn" data-type="video" data-src="wordbank.mp4">拼读视频</div>
      </div>
    </div>
  </div>

  <div class="player">
    <div class="player-tab">
      <button class="player-tab-btn active" id="audio-tab">音频播放</button>
      <button class="player-tab-btn" id="video-tab">视频播放</button>
    </div>

    <div class="video-container" id="video-container">
      <video id="video-player" controls></video>
    </div>

    <div class="audio-tip active" id="audio-tip">请选择要播放的音频/视频</div>

    <div class="controls">
      <button class="control-btn" id="play-btn">▶</button>
      <div class="progress" id="progress">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <select class="speed" id="speed">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>
  </div>
</div>

<script>
const audio = new Audio();
const video = document.getElementById('video-player');
let currentType = '';
let currentBtn = null;

const unitBtns = document.querySelectorAll('.unit-btn');
const playBtn = document.getElementById('play-btn');
const progress = document.getElementById('progress');
const progressBar = document.getElementById('progress-bar');
const speedSelect = document.getElementById('speed');
const audioTip = document.getElementById('audio-tip');
const videoContainer = document.getElementById('video-container');
const audioTab = document.getElementById('audio-tab');
const videoTab = document.getElementById('video-tab');

function resetBtns() {
  unitBtns.forEach(btn => btn.classList.remove('active'));
  currentBtn = null;
}

function resetPlayer() {
  audio.pause();
  video.pause();
  progressBar.style.width = '0%';
  playBtn.textContent = '▶';
}

function playAudio(src, text) {
  resetPlayer();
  currentType = 'audio';
  audio.src = src;
  audio.playbackRate = speedSelect.value;
  audio.play();
  audioTip.textContent = `正在播放：${text} - 音频`;
  playBtn.textContent = '❚❚';
  audioTab.classList.add('active');
  videoTab.classList.remove('active');
  audioTip.classList.add('active');
  videoContainer.classList.remove('active');
}

function playVideo(src, text) {
  resetPlayer();
  currentType = 'video';
  video.src = src;
  video.playbackRate = speedSelect.value;
  video.play();
  audioTip.textContent = `正在播放：${text} - 拼读视频`;
  playBtn.textContent = '❚❚';
  videoTab.classList.add('active');
  audioTab.classList.remove('active');
  videoContainer.classList.add('active');
  audioTip.classList.remove('active');
}

unitBtns.forEach(btn => {
  btn.onclick = function() {
    resetBtns();
    this.classList.add('active');
    currentBtn = this;
    const type = this.dataset.type;
    const src = this.dataset.src;
    const text = this.closest('.unit-card').querySelector('.unit-title').textContent;
    type === 'audio' ? playAudio(src, text) : playVideo(src, text);
  };
});

playBtn.onclick = function() {
  if (!currentBtn) return;
  if (currentType === 'audio') {
    audio.paused ? (audio.play(), playBtn.textContent='❚❚') : (audio.pause(), playBtn.textContent='▶');
  } else if (currentType === 'video') {
    video.paused ? (video.play(), playBtn.textContent='❚❚') : (video.pause(), playBtn.textContent='▶');
  }
};

speedSelect.onchange = function() {
  currentType === 'audio' ? audio.playbackRate = this.value : video.playbackRate = this.value;
};

audio.ontimeupdate = function() {
  progressBar.style.width = (audio.currentTime/audio.duration*100) + '%';
};
video.ontimeupdate = function() {
  progressBar.style.width = (video.currentTime/video.duration*100) + '%';
};

progress.onclick = function(e) {
  const p = e.offsetX / this.offsetWidth;
  currentType === 'audio' ? audio.currentTime = p*audio.duration : video.currentTime = p*video.duration;
};

audio.onended = video.onended = function() {
  playBtn.textContent = '▶';
  progressBar.style.width = '0%';
};

audioTab.onclick = () => {
  audioTab.classList.add('active'); videoTab.classList.remove('active');
  audioTip.classList.add('active'); videoContainer.classList.remove('active');
};
videoTab.onclick = () => {
  videoTab.classList.add('active'); audioTab.classList.remove('active');
  videoContainer.classList.add('active'); audioTip.classList.remove('active');
};
</script>
</body>
</html>
