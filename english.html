<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二年级下册英语乐园 🎈</title>
    <style>
        /* 全局童趣样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "幼圆", Arial, sans-serif; /* 圆润字体 */
        }
        body {
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            background-image: url("https://img.icons8.com/color/40/000000/star.png"), 
                              linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            background-repeat: repeat-x;
            background-position: top 20px left 0;
            background-size: 60px 60px, 100% 100%;
            padding: 20px 10px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 8px 24px rgba(255, 183, 197, 0.2);
        }
        /* 标题样式 */
        .page-title {
            text-align: center;
            font-size: 28px;
            color: #ff6b9d;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(255, 183, 197, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .page-title img {
            width: 40px;
            height: 40px;
        }
        /* 单元卡片布局 */
        .unit-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        /* 单元卡片样式（卡通化） */
        .unit-card {
            background: linear-gradient(135deg, #e8f4ff 0%, #f0f8ff 100%);
            border: 5px solid #4dabf7;
            border-radius: 25px;
            padding: 20px 10px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 6px 12px rgba(77, 171, 247, 0.15);
        }
        .unit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(77, 171, 247, 0.25);
        }
        .unit-title {
            font-size: 20px;
            font-weight: bold;
            color: #228be6;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .unit-title::before {
            content: "✨";
            font-size: 18px;
        }
        /* 按钮组 */
        .unit-btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .unit-btn {
            padding: 10px 0;
            border-radius: 15px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .audio-btn {
            background: linear-gradient(135deg, #74c0fc 0%, #4dabf7 100%);
            color: white;
        }
        .audio-btn:hover {
            background: linear-gradient(135deg, #4dabf7 0%, #228be6 100%);
            transform: scale(1.05);
        }
        .video-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #ff6b9d 100%);
            color: white;
        }
        .video-btn:hover {
            background: linear-gradient(135deg, #ff6b9d 0%, #e64980 100%);
            transform: scale(1.05);
        }
        /* 播放器区域 */
        .player {
            background: linear-gradient(135deg, #fef7fb 0%, #fcf1f7 100%);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 8px 24px rgba(255, 183, 197, 0.15);
            border: 3px solid #ffc2d1;
        }
        .video-container {
            margin-bottom: 20px;
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
            aspect-ratio: 3/4;
            border: 4px solid #ff9a9e;
            box-shadow: 0 6px 12px rgba(255, 154, 158, 0.2);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .audio-tip {
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px dashed #ffd6e0;
            border-radius: 20px;
            margin-bottom: 20px;
            color: #ff6b9d;
            font-size: 20px;
            background: rgba(255, 248, 250, 0.5);
            text-align: center;
            padding: 20px;
        }
        /* 控制栏 */
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b9d 0%, #e64980 100%);
            color: white;
            font-size: 20px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(230, 73, 128, 0.2);
            transition: all 0.2s ease;
        }
        .control-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(230, 73, 128, 0.3);
        }
        .progress {
            flex: 1;
            height: 12px;
            background: #ffe5ec;
            border-radius: 6px;
            cursor: pointer;
            min-width: 150px;
            border: 2px solid #ffc2d1;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #ff6b9d 0%, #e64980 100%);
            border-radius: 4px;
            width: 0%;
        }
        .speed {
            padding: 8px 12px;
            border: 3px solid #ffc2d1;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            background: white;
            color: #ff6b9d;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 可爱标题 -->
        <div class="page-title">
            🎈 二年级下册英语乐园 🎈
        </div>

        <!-- 单元列表（卡通化） -->
        <div class="unit-box">
            <div class="unit-card">
                <div class="unit-title">Unit 1</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('unit1', 'unit1.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('unit1', 'https://www.bilibili.com/video/BV14jPjznEKX')">📺 视频</button>
                </div>
            </div>
            <div class="unit-card">
                <div class="unit-title">Unit 2</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('unit2', 'unit2.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('unit2', 'https://www.bilibili.com/video/BV1xjPjznEez')">📺 视频</button>
                </div>
            </div>
            <div class="unit-card">
                <div class="unit-title">Unit 3</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('unit3', 'unit3.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('unit3', 'https://www.bilibili.com/video/BV14jPjznETg')">📺 视频</button>
                </div>
            </div>
            <div class="unit-card">
                <div class="unit-title">Unit 4</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('unit4', 'unit4.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('unit4', 'https://www.bilibili.com/video/BV18TPjz4ERP')">📺 视频</button>
                </div>
            </div>
            <div class="unit-card">
                <div class="unit-title">Unit 5</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('unit5', 'unit5.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('unit5', 'https://www.bilibili.com/video/BV1QTPjz4EFw/')">📺 视频</button>
                </div>
            </div>
            <div class="unit-card">
                <div class="unit-title">Unit 6</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('unit6', 'unit6.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('unit6', 'video')">📺 视频</button>
                </div>
            </div>
            <div class="unit-card">
                <div class="unit-title">Unit 7</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('unit7', 'unit7.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('unit7', 'video')">📺 视频</button>
                </div>
            </div>
            <div class="unit-card">
                <div class="unit-title">Unit 8</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('unit8', 'unit8.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('unit8', 'video')">📺 视频</button>
                </div>
            </div>
            <div class="unit-card">
                <div class="unit-title">Unit 9</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('unit9', 'unit9.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('unit9', 'video')">📺 视频</button>
                </div>
            </div>
            <div class="unit-card">
                <div class="unit-title">Unit 10</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('unit10', 'unit10.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('unit10', 'video')">📺 视频</button>
                </div>
            </div>
            <div class="unit-card">
                <div class="unit-title">Word Bank</div>
                <div class="unit-btn-group">
                    <button class="unit-btn audio-btn" onclick="playMedia('wordbank', 'wordbank.mp3')">🎵 音频</button>
                    <button class="unit-btn video-btn" onclick="playMedia('wordbank', 'video')">📺 视频</button>
                </div>
            </div>
        </div>

        <!-- 播放器区域（可爱化） -->
        <div class="player">
            <div class="video-container" id="videoContainer" style="display: none;">
                <video id="videoPlayer" controls ontimeupdate="updateProgress()"></video>
            </div>
            <div class="audio-tip" id="audioTip">🎀 点击上方单元，选择音频/视频播放吧～ 🎀</div>
            
            <div class="controls">
                <button class="control-btn" id="playBtn" onclick="togglePlay()">▶</button>
                <div class="progress" onclick="seekProgress(event)">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <select class="speed" id="speedSelect" onchange="changeSpeed()">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1x 正常</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        let currentMedia = null;
        let isPlaying = false;
        let mediaType = ''; // audio / video

        // 播放音频/视频
        function playMedia(unitKey, type) {
            mediaType = type;
            const audioTip = document.getElementById('audioTip');
            const videoContainer = document.getElementById('videoContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            
            // 重置进度条
            document.getElementById('progressBar').style.width = '0%';
            
            if (type === 'audio') {
                // 隐藏视频，显示音频提示
                videoContainer.style.display = 'none';
                audioTip.style.display = 'flex';
                audioTip.textContent = `🎵 正在播放 ${unitKey} 音频～`;
                
                // 停止之前的媒体
                if (currentMedia) {
                    currentMedia.pause();
                }
                
                // 创建新的音频对象
                currentMedia = new Audio(`${unitKey}.mp3`);
                currentMedia.playbackRate = document.getElementById('speedSelect').value;
                currentMedia.play();
                isPlaying = true;
                document.getElementById('playBtn').textContent = '❚❚';
                
                // 监听进度更新
                currentMedia.ontimeupdate = updateProgress;
                currentMedia.onended = playEnd;
            } else if (type === 'video') {
                // 显示视频，隐藏音频提示
                audioTip.style.display = 'none';
                videoContainer.style.display = 'block';
                
                // 停止之前的媒体
                if (currentMedia) {
                    currentMedia.pause();
                }
                
                // 设置视频源并播放
                videoPlayer.src = `${unitKey}.mp4`;
                videoPlayer.playbackRate = document.getElementById('speedSelect').value;
                videoPlayer.play();
                currentMedia = videoPlayer;
                isPlaying = true;
                document.getElementById('playBtn').textContent = '❚❚';
            }
        }

        // 暂停/播放切换
        function togglePlay() {
            if (!currentMedia) return;
            
            if (isPlaying) {
                currentMedia.pause();
                document.getElementById('playBtn').textContent = '▶';
            } else {
                currentMedia.play();
                document.getElementById('playBtn').textContent = '❚❚';
            }
            isPlaying = !isPlaying;
        }

        // 更新进度条
        function updateProgress() {
            if (!currentMedia) return;
            
            const percent = (currentMedia.currentTime / currentMedia.duration) * 100;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        // 进度条点击跳转
        function seekProgress(event) {
            if (!currentMedia) return;
            
            const progressBar = event.currentTarget;
            const clickX = event.offsetX;
            const percent = (clickX / progressBar.offsetWidth) * 100;
            currentMedia.currentTime = (percent / 100) * currentMedia.duration;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        // 播放结束
        function playEnd() {
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶';
            document.getElementById('progressBar').style.width = '0%';
            if (mediaType === 'audio') {
                document.getElementById('audioTip').textContent = '🎀 播放结束啦～换个单元听听吧 🎀';
            }
        }

        // 改变播放速度
        function changeSpeed() {
            if (!currentMedia) return;
            
            const speed = document.getElementById('speedSelect').value;
            currentMedia.playbackRate = speed;
        }
    </script>
</body>
</html>
